server {
    listen 80;
    charset utf-8;

    # ── Admin SPA (avant / pour priorité de matching) ──
    location /app/ {
        alias /www/app/;
        index index.html;
        try_files $uri $uri/ /app/index.html;
    }

    # ── PocketBase API ──
    location /api/ {
        proxy_pass         http://Intervys_pocketbase:8090/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── PocketBase superadmin UI ──
    location /_/ {
        proxy_pass         http://Intervys_pocketbase:8090/_/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Envoi PDF par email ──
    location /send-doc {
        proxy_pass         http://Intervys_pocketbase:8090/send-doc;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_read_timeout 60s;
        client_max_body_size 10m;
    }

    # ── Vitrine publique ──
    location / {
        root  /www/vitrine;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Cache long assets statiques
    location ~* \.(css|js|png|jpg|ico|woff2|svg|webp)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
