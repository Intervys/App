<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --primary:#1e90ff; --primary-dark:#0b6fd4; --accent:#0f172a;
    --bg:#0a0e1a; --bg2:#111827; --surface:#0f1626; --text:#e8eef7; --muted:#9fb0c9;
    --hero-from:#0b1220; --hero-to:#13233f; --radius:16px;
    --f-head:'Rajdhani',sans-serif; --f-body:'Barlow',system-ui,sans-serif;
  }
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--text);font-family:var(--f-body);line-height:1.6;-webkit-font-smoothing:antialiased}
  h1,h2,h3{font-family:var(--f-head);line-height:1.15;font-weight:700}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1140px;margin:0 auto;padding:0 1.5rem}
  .btn{display:inline-flex;align-items:center;gap:.5rem;background:var(--primary);color:#fff;
    padding:.85rem 1.6rem;border-radius:100px;font-weight:600;font-family:var(--f-head);
    letter-spacing:.02em;border:none;cursor:pointer;transition:.25s;font-size:1rem}
  .btn:hover{background:var(--primary-dark);transform:translateY(-2px);box-shadow:0 10px 30px -8px var(--primary)}
  .btn-ghost{background:transparent;border:1.5px solid var(--primary);color:var(--primary)}
  .btn-ghost:hover{background:var(--primary);color:#fff}

  /* NAV */
  nav{position:sticky;top:0;z-index:50;backdrop-filter:blur(14px);
    background:color-mix(in srgb,var(--bg) 78%,transparent);border-bottom:1px solid color-mix(in srgb,var(--text) 10%,transparent)}
  nav .wrap{display:flex;align-items:center;justify-content:space-between;height:70px}
  .brand{display:flex;align-items:center;gap:.6rem;font-family:var(--f-head);font-weight:700;font-size:1.35rem}
  .brand .dot{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-size:1.2rem;
    background:linear-gradient(135deg,var(--primary),var(--primary-dark));box-shadow:0 6px 18px -6px var(--primary)}
  .navlinks{display:flex;align-items:center;gap:2rem;font-weight:500}
  .navlinks a{color:var(--muted);transition:.2s;font-size:.97rem}
  .navlinks a:hover{color:var(--text)}
  .burger{display:none;background:none;border:none;color:var(--text);font-size:1.6rem;cursor:pointer}

  /* HERO */
  .hero{position:relative;overflow:hidden;background:
     radial-gradient(1200px 500px at 80% -10%,color-mix(in srgb,var(--primary) 28%,transparent),transparent 60%),
     linear-gradient(160deg,var(--hero-from),var(--hero-to))}
  .hero .wrap{padding:6rem 1.5rem 7rem;display:grid;grid-template-columns:1.1fr .9fr;gap:3rem;align-items:center}
  .eyebrow{display:inline-flex;align-items:center;gap:.5rem;font-family:var(--f-head);font-weight:600;
    letter-spacing:.14em;text-transform:uppercase;font-size:.78rem;color:var(--primary);
    background:color-mix(in srgb,var(--primary) 14%,transparent);padding:.4rem .9rem;border-radius:100px;margin-bottom:1.4rem}
  .hero h1{font-size:clamp(2.4rem,5vw,3.9rem);margin-bottom:1.2rem}
  .hero h1 em{font-style:normal;color:var(--primary)}
  .hero p{font-size:1.18rem;color:var(--muted);max-width:34rem;margin-bottom:2rem}
  .hero-cta{display:flex;gap:1rem;flex-wrap:wrap}
  .hero-art{aspect-ratio:1;border-radius:30px;position:relative;display:grid;place-items:center;
    background:linear-gradient(145deg,color-mix(in srgb,var(--primary) 22%,var(--surface)),var(--surface));
    border:1px solid color-mix(in srgb,var(--text) 10%,transparent);box-shadow:0 30px 80px -30px var(--primary);overflow:hidden}
  .hero-art .emoji{font-size:clamp(6rem,16vw,11rem);filter:drop-shadow(0 12px 30px rgba(0,0,0,.4))}
  .hero-art .ring{position:absolute;inset:0;background:
    repeating-conic-gradient(from 0deg,color-mix(in srgb,var(--primary) 8%,transparent) 0deg 12deg,transparent 12deg 24deg);
    opacity:.4;animation:spin 40s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .stats{display:flex;gap:2.5rem;margin-top:2.5rem;flex-wrap:wrap}
  .stats div b{font-family:var(--f-head);font-size:1.7rem;color:var(--text);display:block}
  .stats div span{color:var(--muted);font-size:.85rem}

  /* SECTIONS */
  section{padding:5.5rem 0}
  .sec-head{text-align:center;max-width:42rem;margin:0 auto 3.2rem}
  .sec-head .eyebrow{margin-bottom:1rem}
  .sec-head h2{font-size:clamp(1.9rem,3.6vw,2.7rem);margin-bottom:.8rem}
  .sec-head p{color:var(--muted);font-size:1.08rem}
  #services{background:var(--bg2)}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.4rem}
  .card{background:var(--surface);border:1px solid color-mix(in srgb,var(--text) 9%,transparent);
    border-radius:var(--radius);padding:2rem 1.7rem;transition:.3s}
  .card:hover{transform:translateY(-6px);border-color:color-mix(in srgb,var(--primary) 55%,transparent);
    box-shadow:0 24px 50px -24px var(--primary)}
  .card .ic{width:58px;height:58px;border-radius:15px;display:grid;place-items:center;font-size:1.7rem;margin-bottom:1.2rem;
    background:color-mix(in srgb,var(--primary) 16%,transparent)}
  .card h3{font-size:1.25rem;margin-bottom:.5rem}
  .card p{color:var(--muted);font-size:.96rem}

  /* GALLERY */
  .gal{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem}
  .tile{aspect-ratio:1;border-radius:var(--radius);display:grid;place-items:center;position:relative;overflow:hidden;
    background:linear-gradient(145deg,color-mix(in srgb,var(--primary) 20%,var(--surface)),var(--surface));
    border:1px solid color-mix(in srgb,var(--text) 8%,transparent);transition:.3s}
  .tile:hover{transform:scale(1.04)}
  .tile .e{font-size:3.4rem;filter:drop-shadow(0 8px 16px rgba(0,0,0,.35))}
  .tile span{position:absolute;bottom:.7rem;left:.8rem;font-size:.8rem;font-weight:600;color:var(--text);
    background:color-mix(in srgb,var(--bg) 60%,transparent);padding:.2rem .6rem;border-radius:8px;backdrop-filter:blur(6px)}

  /* ABOUT */
  #about .wrap{display:grid;grid-template-columns:.85fr 1.15fr;gap:3.5rem;align-items:center}
  .about-art{aspect-ratio:4/5;border-radius:24px;display:grid;place-items:center;font-size:8rem;
    background:linear-gradient(160deg,color-mix(in srgb,var(--primary) 26%,var(--surface)),var(--surface));
    border:1px solid color-mix(in srgb,var(--text) 10%,transparent)}
  #about h2{font-size:clamp(1.8rem,3.4vw,2.5rem);margin-bottom:1.2rem}
  #about p{color:var(--muted);margin-bottom:1rem;font-size:1.06rem}
  .checks{list-style:none;margin-top:1.5rem;display:grid;gap:.7rem}
  .checks li{display:flex;align-items:center;gap:.7rem;font-weight:500}
  .checks li::before{content:'✓';display:grid;place-items:center;width:26px;height:26px;border-radius:50%;
    background:var(--primary);color:#fff;font-size:.8rem;flex:none}

  /* CONTACT */
  #contact{background:var(--bg2)}
  .contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:start}
  .info-item{display:flex;gap:1rem;align-items:center;margin-bottom:1.4rem}
  .info-item .ic{width:50px;height:50px;border-radius:13px;display:grid;place-items:center;font-size:1.3rem;flex:none;
    background:color-mix(in srgb,var(--primary) 16%,transparent)}
  .info-item b{display:block;font-family:var(--f-head)}
  .info-item span{color:var(--muted);font-size:.95rem}
  form{display:grid;gap:1rem;background:var(--surface);padding:2rem;border-radius:var(--radius);
    border:1px solid color-mix(in srgb,var(--text) 9%,transparent)}
  input,textarea{width:100%;background:var(--bg);border:1px solid color-mix(in srgb,var(--text) 14%,transparent);
    border-radius:11px;padding:.85rem 1rem;color:var(--text);font-family:inherit;font-size:.97rem}
  input:focus,textarea:focus{outline:none;border-color:var(--primary)}
  label{font-size:.82rem;color:var(--muted);font-weight:600;margin-bottom:-.4rem}

  /* ACTUALITÉS */
  #actu{background:var(--bg)}
  .art-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.4rem}
  .art-card{background:var(--surface);border:1px solid color-mix(in srgb,var(--text) 9%,transparent);
    border-radius:var(--radius);padding:1.75rem;transition:.3s;border-top:3px solid var(--primary)}
  .art-card:hover{transform:translateY(-4px);box-shadow:0 20px 40px -20px var(--primary)}
  .art-meta{font-size:.75rem;color:var(--primary);font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.6rem}
  .art-title{font-size:1.15rem;margin-bottom:.6rem;line-height:1.3}
  .art-body{color:var(--muted);font-size:.95rem;line-height:1.7}

  /* FOOTER */
  footer{padding:3rem 0;border-top:1px solid color-mix(in srgb,var(--text) 9%,transparent);text-align:center;color:var(--muted)}
  footer .brand{justify-content:center;margin-bottom:1rem;color:var(--text)}

  /* THEME BADGE (preview) */
  .theme-badge{position:fixed;bottom:1rem;right:1rem;z-index:99;background:var(--surface);
    border:1px solid color-mix(in srgb,var(--primary) 50%,transparent);border-radius:100px;
    padding:.5rem 1rem;font-size:.82rem;font-weight:600;color:var(--primary);box-shadow:0 10px 30px -10px #000}

  @media(max-width:900px){
    .hero .wrap,#about .wrap,.contact-grid{grid-template-columns:1fr}
    .hero-art{max-width:380px;margin:0 auto;order:-1}
    .grid{grid-template-columns:repeat(2,1fr)}
    .gal{grid-template-columns:repeat(2,1fr)}
    .navlinks{position:fixed;inset:70px 0 auto 0;flex-direction:column;background:var(--bg2);padding:1.5rem;
      gap:1.2rem;transform:translateY(-150%);transition:.3s;border-bottom:1px solid color-mix(in srgb,var(--text) 10%,transparent)}
    .navlinks.open{transform:translateY(0)}
    .burger{display:block}
  }
  @media(max-width:560px){.grid,.gal{grid-template-columns:1fr}}
</style>
</head>

// ── Résolution du thème : ?theme= puis settings PocketBase puis défaut ──
const PB_DEFAULT = location.origin.replace('://www.', '://').replace('://', '://app.');

async function resolveConfig() {
  const params = new URLSearchParams(location.search);
  let themeKey = params.get('theme');
  const overrides = {};

  // Si pas de thème forcé dans l'URL → lire les settings publics de PocketBase
  if (!themeKey) {
    try {
      const base = (params.get('api') || PB_DEFAULT).replace(/\/$/, '');
      const keys = ['hg_site_theme','site_name','site_tagline','site_desc','site_phone','site_email','site_zone',
                    'site_about','site_hero_eyebrow','site_hero_title','site_hero_sub','site_cta','site_cta2',
                    'site_stats','site_services','site_gallery','site_about_emoji','site_about_title',
                    'site_about_text','site_checks','site_articles'];
      const filter = keys.map(k => "key='" + k + "'").join(' || ');
      const r = await fetch(base + '/api/collections/settings/records?perPage=50&filter=' + encodeURIComponent(filter));
      if (r.ok) {
        const data = await r.json();
        const map = {};
        (data.items || []).forEach(it => map[it.key] = it.value);
        themeKey = map['hg_site_theme'] || 'default';
        if (map['site_name'])         overrides.name        = map['site_name'];
        if (map['site_tagline'])       overrides.tagline     = map['site_tagline'];
        if (map['site_desc'])          overrides.heroSub     = map['site_desc'];
        if (map['site_hero_sub'])      overrides.heroSub     = map['site_hero_sub'];
        if (map['site_hero_eyebrow'])  overrides.heroEyebrow = map['site_hero_eyebrow'];
        if (map['site_hero_title'])    overrides.heroTitle   = map['site_hero_title'];
        if (map['site_cta'])           overrides.cta         = map['site_cta'];
        if (map['site_cta2'])          overrides.cta2        = map['site_cta2'];
        if (map['site_phone'])         overrides.phone       = map['site_phone'];
        if (map['site_email'])         overrides.email       = map['site_email'];
        if (map['site_zone'])          overrides.zone        = map['site_zone'];
        if (map['site_about_text'])    overrides.about       = map['site_about_text'];
        else if (map['site_about'])    overrides.about       = map['site_about'];
        if (map['site_about_title'])   overrides.aboutTitle  = map['site_about_title'];
        if (map['site_about_emoji'])   overrides.aboutEmoji  = map['site_about_emoji'];
        try { if (map['site_stats'])    overrides.stats    = JSON.parse(map['site_stats']); } catch{}
        try { if (map['site_services']) overrides.services = JSON.parse(map['site_services']); } catch{}
        try { if (map['site_gallery'])  overrides.gallery  = JSON.parse(map['site_gallery']); } catch{}
        try { if (map['site_checks'])   overrides.checks   = JSON.parse(map['site_checks']); } catch{}
        try { if (map['site_articles']) overrides.articles = JSON.parse(map['site_articles']); } catch{}
      }
    } catch(e) { /* offline / CORS → défaut */ }
  }

  const t = THEMES[themeKey] || THEMES.default;
  return { key: THEMES[themeKey] ? themeKey : 'default', t: Object.assign({}, t, overrides), preview: !!params.get('theme') };
}

function applyTheme(t) {
  for (const [k,v] of Object.entries(t.vars)) document.documentElement.style.setProperty(k, v);
  document.documentElement.style.setProperty('--f-head', "'" + t.font.head + "',serif");
  document.documentElement.style.setProperty('--f-body', "'" + t.font.body + "',system-ui,sans-serif");
  const link = document.createElement('link');
  link.rel = 'stylesheet';
  link.href = 'https://fonts.googleapis.com/css2?family=' + t.font.param + '&display=swap';
  document.head.appendChild(link);
  document.title = t.name + ' — ' + t.tagline;
}

      <div class="stats">${stats}</div>
    </div>
    <div class="hero-art"><div class="ring"></div><div class="emoji">${t.emoji}</div></div>

  <section id="services"><div class="wrap">
    <div class="sec-head"><span class="eyebrow">${t.servicesTitle}</span><h2>${t.servicesTitle}</h2><p>${t.servicesSub}</p></div>

  </div></section>

  <section id="gallery"><div class="wrap">

    <div class="gal">${gal}</div>
  </div></section>

  <section id="about"><div class="wrap">
    <div class="about-art">${t.aboutEmoji}</div>
    <div>
      <span class="eyebrow">À propos</span>
      <h2>${t.aboutTitle}</h2>
      <p>${t.about}</p>
      <ul class="checks">${checks}</ul>
    </div>
  </div></section>

  ${arts.length ? `<section id="actu"><div class="wrap">
    <div class="sec-head"><span class="eyebrow">Actualités</span><h2>Nos dernières nouvelles</h2><p>Suivez nos actualités, conseils et annonces.</p></div>
    <div class="art-grid">${artHtml}</div>
  </div></section>` : ''}

  <section id="contact"><div class="wrap">
    <div class="sec-head"><span class="eyebrow">Contact</span><h2>Parlons de votre projet</h2><p>Contactez-nous, réponse sous 24h.</p></div>
    <div class="contact-grid">

        <div class="info-item"><div class="ic">✉️</div><div><b>Email</b><span>${t.email}</span></div></div>
        <div class="info-item"><div class="ic">📍</div><div><b>Zone</b><span>${t.zone}</span></div></div>
      </div>
      <form onsubmit="event.preventDefault();this.style.display='none';this.nextElementSibling.style.display='block'">
        <div><label>Nom</label><input required placeholder="Votre nom"></div>
        <div><label>Email</label><input type="email" required placeholder="vous@email.fr"></div>
        <div><label>Message</label><textarea rows="4" required placeholder="Votre demande…"></textarea></div>
        <button class="btn" type="submit">Envoyer le message</button>
      </form>
      <div style="display:none;background:var(--surface);padding:2rem;border-radius:var(--radius);text-align:center">
        <div style="font-size:2.5rem">✅</div><h3 style="margin:.5rem 0">Message envoyé !</h3>
        <p style="color:var(--muted)">Merci, nous vous recontactons rapidement.</p>
      </div>
    </div>
  </div></section>

  <footer><div class="wrap">
    <div class="brand"><span class="dot">${t.emoji}</span>${t.name}</div>
    <p>${t.tagline} · © ${new Date().getFullYear()} ${t.name}</p>
    <p style="margin-top:.5rem;font-size:.82rem;opacity:.7">Site propulsé par Intervys</p>
  </div></footer>

  ${cfg.preview ? `<div class="theme-badge">🎨 Aperçu : thème « ${t.label} »</div>` : ''}`;

  document.querySelectorAll('#nav a').forEach(a => a.addEventListener('click', () => document.getElementById('nav').classList.remove('open')));
}

(async function(){
  const cfg = await resolveConfig();
  applyTheme(cfg.t);
  render(cfg);
})();
</script>
