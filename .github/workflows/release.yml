name: Release

on:
  push:
    tags:
      - 'v*'

jobs:

  # ── Build Windows installer ──────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            controller -> target
            setup/src-tauri -> target

      - name: Build controller (intervys.exe + uninstall.exe)
        working-directory: controller
        run: |
          cargo build --release
          cp target/release/intervys.exe  ../setup/src/payload/intervys.exe
          cp target/release/uninstall.exe ../setup/src/payload/uninstall.exe

      - name: Build intervys-setup.exe
        working-directory: setup/src-tauri
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: setup/src-tauri/target/release/intervys-setup.exe

  # ── Publier la release avec les deux assets ──────────────────
  release:
    runs-on: ubuntu-latest
    needs: build-windows
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Récupérer l'exe Windows
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: dist/

      - name: Créer intervys-deploy.zip (Docker)
        run: |
          mkdir -p pkg
          cp -r app         pkg/app
          cp -r vitrine     pkg/vitrine
          cp    nginx.conf  pkg/nginx.conf
          mkdir -p pkg/migrations pkg/hooks pkg/mailer
          cp -r pocketbase/migrations/. pkg/migrations/
          cp -r pocketbase/hooks/.      pkg/hooks/
          cp    mailer/server.js        pkg/mailer/
          cp    mailer/package.json     pkg/mailer/
          cd pkg && zip -r ../intervys-deploy.zip . && cd ..
          echo "Docker ZIP : $(du -sh intervys-deploy.zip | cut -f1)"
          echo "Windows EXE : $(du -sh dist/intervys-setup.exe | cut -f1)"

      - name: Publier la release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/intervys-setup.exe
            intervys-deploy.zip
            docker-compose.install.yml
            .env.example
          body: |
            ## Installation

            ### Windows
            Télécharger **`intervys-setup.exe`** et l'exécuter.

            ### Docker (Linux / VPS)
            ```bash
            curl -fsSL https://github.com/${{ github.repository }}/releases/latest/download/docker-compose.install.yml \
                 -o docker-compose.yml
            # Optionnel : créer un .env avec vos paramètres
            docker compose up -d
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
