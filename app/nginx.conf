server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # API -> PocketBase (doit etre AVANT la regle SPA)
    location /api/ {
        proxy_pass         http://Intervys_pocketbase:8090/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        client_max_body_size 10m;
    }

    # Envoi email document avec PDF -> PocketBase
    location /send-doc {
        proxy_pass         http://Intervys_pocketbase:8090/send-doc;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 10m;
    }

    # SPA : toutes les autres routes -> index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache long pour les assets statiques
    location ~* \.(css|js|png|jpg|ico|woff2|svg)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
